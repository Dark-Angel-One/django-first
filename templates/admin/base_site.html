{% extends "admin/base.html" %}

{% block title %}{{ title }} | {{ site_title|default:_('Django site admin') }}{% endblock %}

{% block extrastyle %}
<style>
    /* ТИМЛИД: Хакерская "Матрица" тема для админки. 
       Ограничиваем ее ТОЛЬКО для темного режима! В светлом - классика. */
    
    /* 1. Настройка переменных и фона только для темного режима */
    html[data-theme="dark"] {
        --primary-neon: #00ff00;
        --bg-glass: rgba(0, 15, 0, 0.85);
        --border-neon: #005500;
        background-color: #000 !important;
    }

    html[data-theme="dark"] body {
        background-color: transparent !important;
        color: var(--primary-neon) !important;
        font-family: 'Courier New', Courier, monospace !important;
        overflow-x: hidden;
    }

    /* 2. Полупрозрачные стеклянные панели */
    html[data-theme="dark"] #header, 
    html[data-theme="dark"] .module, 
    html[data-theme="dark"] #content-main, 
    html[data-theme="dark"] .object-tools a, 
    html[data-theme="dark"] .submit-row {
        background: var(--bg-glass) !important;
        border: 1px solid var(--border-neon) !important;
        box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
        backdrop-filter: blur(5px);
    }

    html[data-theme="dark"] #header {
        border-bottom: 2px solid var(--primary-neon) !important;
    }

    html[data-theme="dark"] #branding h1 {
        color: var(--primary-neon) !important;
        text-shadow: 0 0 10px var(--primary-neon);
        font-weight: bold;
        letter-spacing: 2px;
    }
    html[data-theme="dark"] #branding h1::before {
        content: "> root@server:~# ";
        opacity: 0.7;
    }

    /* 3. Ссылки */
    html[data-theme="dark"] a:link, 
    html[data-theme="dark"] a:visited {
        color: #55ff55 !important;
        text-decoration: none;
    }
    html[data-theme="dark"] a:hover {
        text-decoration: underline;
        text-shadow: 0 0 5px #55ff55;
    }

    /* 4. Кнопки */
    html[data-theme="dark"] .button, 
    html[data-theme="dark"] input[type=submit], 
    html[data-theme="dark"] input[type=button], 
    html[data-theme="dark"] .submit-row input, 
    html[data-theme="dark"] a.button {
        background: #002200 !important;
        color: var(--primary-neon) !important;
        border: 1px solid var(--primary-neon) !important;
        text-transform: uppercase;
        font-weight: bold;
        letter-spacing: 1px;
        transition: all 0.3s ease;
    }
    
    html[data-theme="dark"] .button:hover, 
    html[data-theme="dark"] input[type=submit]:hover, 
    html[data-theme="dark"] a.button:hover {
        background: var(--primary-neon) !important;
        color: #000 !important;
        box-shadow: 0 0 15px var(--primary-neon);
    }

    /* 5. Инпуты */
    html[data-theme="dark"] input, 
    html[data-theme="dark"] select, 
    html[data-theme="dark"] textarea {
        background: rgba(0, 20, 0, 0.6) !important;
        color: var(--primary-neon) !important;
        border: 1px solid var(--primary-neon) !important;
        padding: 5px;
        outline: none;
    }
    html[data-theme="dark"] input:focus, 
    html[data-theme="dark"] textarea:focus {
        box-shadow: inset 0 0 5px var(--primary-neon);
    }

    /* 6. Таблицы */
    html[data-theme="dark"] thead th {
        background: #002200 !important;
        color: var(--primary-neon) !important;
        border-bottom: 1px solid var(--primary-neon) !important;
    }
    
    html[data-theme="dark"] tr.row1, 
    html[data-theme="dark"] tr.row2 {
        background: transparent !important;
    }
    html[data-theme="dark"] tr:hover {
        background: rgba(0, 255, 0, 0.1) !important;
    }

    /* Канвас на заднем фоне */
    #matrix-canvas {
        position: fixed;
        top: 0; 
        left: 0; 
        width: 100vw; 
        height: 100vh;
        z-index: -1;
        display: none; /* Скрыто по умолчанию (для светлой темы) */
    }

    /* Показываем канвас только в темной теме */
    html[data-theme="dark"] #matrix-canvas, html.dark #matrix-canvas, [data-theme="dark"] #matrix-canvas {
        display: block; 
    }
</style>
{% endblock %}

{% block content %}
    <!-- Анимация Матрицы -->
    <canvas id="matrix-canvas"></canvas>
    <script>
        // ТИМЛИД: Оптимизированный скрипт анимации (Больше не грузит систему!)
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()_+-=<>?';
        const fontSize = 16;
        let columns = Math.floor(canvas.width / fontSize);
        let drops = Array(columns).fill(1);
        let lastDrawTime = 0;

        // Используем requestAnimationFrame для плавной работы и снижения нагрузки на процессор
        function draw(timestamp) {
            requestAnimationFrame(draw);

            // Проверяем, активна ли темная тема. Если нет - НИЧЕГО НЕ СЧИТАЕМ (экономия ресурсов!)
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark' ||
                           document.documentElement.classList.contains('dark') ||
                           localStorage.getItem('theme') === 'dark';
            if (!isDark) {
                return;
            }

            // Ограничиваем FPS (кадры в секунду) до ~30 (каждые 33мс), чтобы не перегружать страницу
            if (timestamp - lastDrawTime < 33) return;
            lastDrawTime = timestamp;

            // Пересчитываем колонки, если размер окна изменился
            const currentColumns = Math.floor(canvas.width / fontSize);
            if (currentColumns !== drops.length) {
                const oldDrops = drops;
                drops = Array(currentColumns).fill(1);
                for(let i = 0; i < Math.min(oldDrops.length, currentColumns); i++){
                    drops[i] = oldDrops[i];
                }
            }

            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px Courier New';

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        
        // Запускаем цикл анимации
        requestAnimationFrame(draw);
    </script>

    {{ block.super }}
{% endblock %}
